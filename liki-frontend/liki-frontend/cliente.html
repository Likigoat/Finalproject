
<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>Compras – Cliente | Liki</title>
  <link rel="stylesheet" href="styles.css"/>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;800&family=Playfair+Display:wght@600;700&display=swap" rel="stylesheet">
</head>
<body>
  <header class="header">
    <div class="logo">Liki <span>Distribuciones</span></div>
    <nav class="nav flex">
      <a href="overview.html">Inicio</a>
      <a href="#" id="logout" class="right">Cerrar sesión</a>
    </nav>
  </header>

  <main class="container">
    <h1 class="section-title">Comprar artículos</h1>
    <div class="grid grid-3" id="gridProductos"></div>

    <section class="card" style="margin-top:16px">
      <h2>Carrito</h2>
      <div id="carritoVacio">Tu carrito está vacío.</div>
      <div id="carritoLista" class="hidden"></div>
      <div class="flex" style="justify-content:space-between; margin-top:10px">
        <strong id="total"></strong>
        <button id="comprar" class="btn btn-gold hidden">Comprar</button>
      </div>
      <div id="orderMsg" class="alert hidden"></div>
    </section>
  </main>

  <footer class="footer">© 2026 Liki Distribuciones</footer>

  <script src="js/config.js"></script>
  <script src="js/api.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/cliente.js"></script>
</body>
</html>
