
<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>Admin – Inventario | Liki</title>
  <link rel="stylesheet" href="styles.css"/>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;800&family=Playfair+Display:wght@600;700&display=swap" rel="stylesheet">
</head>
<body>
  <header class="header">
    <div class="logo">Liki <span>Distribuciones</span></div>
    <nav class="nav flex">
      <a href="index.html">Inicio</a>
      <a href="#" id="logout" class="right">Cerrar sesión</a>
    </nav>
  </header>

  <main class="container">
    <h1 class="section-title">Administración de Inventario</h1>

    <section class="card">
      <h2>Crear producto</h2>
      <form id="createForm" class="grid grid-2">
        <div>
          <label>Nombre</label>
          <input id="pName" class="input" required>
        </div>
        <div>
          <label>Precio</label>
          <input id="pPrice" class="input" type="number" step="0.01" required>
        </div>
        <div>
          <label>Stock</label>
          <input id="pStock" class="input" type="number" min="0" required>
        </div>
        <div>
          <label>URL imagen</label>
          <input id="pImage" class="input" type="url" placeholder="https://...">
        </div>
        <div style="grid-column:1/-1">
          <label>Descripción</label>
          <textarea id="pDesc" class="input" rows="3"></textarea>
        </div>
        <div>
          <button class="btn btn-gold" type="submit">Crear</button>
        </div>
      </form>
      <div id="createMsg" class="alert hidden"></div>
    </section>

    <section class="card" style="margin-top:16px">
      <h2>Productos</h2>
      <table class="table" id="tbl">
        <thead>
          <tr><th>ID</th><th>Nombre</th><th>Precio</th><th>Stock</th><th>Acciones</th></tr>
        </thead>
        <tbody id="rows"></tbody>
      </table>
    </section>
  </main>

  <footer class="footer">© 2026 Liki Distribuciones</footer>

  <script src="js/config.js"></script>
  <script src="js/api.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/admin.js"></script>
</body>
</html>
